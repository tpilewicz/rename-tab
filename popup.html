<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }
    h3 {
      margin: 0 0 8px;
    }
    input {
      width: 100%;
      padding: 6px 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    .buttons {
      margin-top: 8px;
      display: flex;
      gap: 6px;
    }
    button {
      flex: 1;
      padding: 6px 0;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    #rename {
      background: #0060df;
      color: #fff;
    }
    #reset {
      background: #e0e0e6;
      color: #15141a;
    }
  </style>
</head>
<body>
  <h3>Rename Tab</h3>
  <input id="title" type="text" placeholder="Enter new tab title">
  <div class="buttons">
    <button id="rename">Rename</button>
    <button id="reset">Reset</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
